<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>机票比价 - FlightCompare</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #1a73e8;
            --primary-dark: #1557b0;
            --accent: #ff6d00;
            --bg: #f5f7fa;
            --card: #ffffff;
            --text: #1f2937;
            --text-light: #6b7280;
            --border: #e5e7eb;
            --success: #10b981;
            --danger: #ef4444;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, #0d47a1 100%);
            color: white;
            padding: 24px 16px 32px;
            text-align: center;
        }
        .header h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
        .header p { font-size: 13px; opacity: 0.85; }

        /* Search Panel */
        .search-panel {
            max-width: 600px;
            margin: -20px auto 16px;
            padding: 0 16px;
        }
        .search-card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 20px;
        }
        .swap-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }
        .input-group {
            flex: 1;
            position: relative;
        }
        .input-group label {
            display: block;
            font-size: 12px;
            color: var(--text-light);
            margin-bottom: 4px;
            font-weight: 500;
        }
        .input-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-group input:focus { border-color: var(--primary); }
        .swap-btn {
            width: 36px; height: 36px;
            border: 1.5px solid var(--border);
            border-radius: 50%; background: white;
            cursor: pointer; display: flex;
            align-items: center; justify-content: center;
            color: var(--primary); font-size: 16px;
            margin-top: 18px; transition: all 0.2s; flex-shrink: 0;
        }
        .swap-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }
        .date-row { margin-bottom: 16px; }
        .date-row input {
            width: 100%; padding: 10px 12px;
            border: 1.5px solid var(--border);
            border-radius: 8px; font-size: 15px; outline: none;
        }
        .search-btn {
            width: 100%; padding: 12px;
            background: var(--primary); color: white;
            border: none; border-radius: 8px;
            font-size: 16px; font-weight: 600;
            cursor: pointer; transition: background 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .search-btn:hover { background: var(--primary-dark); }
        .search-btn:disabled { background: var(--text-light); cursor: not-allowed; }

        /* Airport Suggestions */
        .suggestions {
            position: absolute; top: 100%; left: 0; right: 0;
            background: white; border: 1px solid var(--border);
            border-radius: 8px; box-shadow: var(--shadow);
            z-index: 100; max-height: 220px; overflow-y: auto; display: none;
        }
        .suggestions.active { display: block; }
        .suggestion-item {
            padding: 10px 12px; cursor: pointer;
            font-size: 14px; border-bottom: 1px solid var(--border);
        }
        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-item:hover { background: #f0f4ff; }
        .suggestion-item .code { font-weight: 700; color: var(--primary); margin-right: 6px; }
        .suggestion-item .city { color: var(--text-light); font-size: 12px; }

        /* Results */
        .results { max-width: 600px; margin: 0 auto; padding: 0 16px 32px; }
        .results-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 12px;
        }
        .results-header h2 { font-size: 16px; color: var(--text); }
        .results-count { font-size: 13px; color: var(--text-light); }

        /* Flight Card */
        .flight-card {
            background: var(--card); border-radius: var(--radius);
            box-shadow: var(--shadow); margin-bottom: 12px; overflow: hidden;
            transition: transform 0.2s;
        }
        .flight-card:active { transform: scale(0.99); }
        .flight-main { padding: 16px; }
        .flight-airline {
            display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
        }
        .airline-logo {
            width: 36px; height: 36px; border-radius: 8px;
            background: #f0f4ff; display: flex; align-items: center;
            justify-content: center; overflow: hidden;
        }
        .airline-logo img { width: 28px; height: 28px; object-fit: contain; }
        .airline-logo-text {
            font-size: 13px; font-weight: 700; color: var(--primary);
        }
        .airline-info .airline-name { font-size: 14px; font-weight: 600; }
        .airline-info .flight-number { font-size: 12px; color: var(--text-light); }
        .flight-route {
            display: flex; align-items: center; justify-content: space-between; gap: 12px;
        }
        .route-point { text-align: center; min-width: 70px; }
        .route-time { font-size: 22px; font-weight: 700; }
        .route-code { font-size: 13px; color: var(--text-light); font-weight: 500; }
        .route-airport { font-size: 11px; color: var(--text-light); }
        .route-line {
            flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
        }
        .route-duration { font-size: 12px; color: var(--text-light); }
        .route-bar {
            width: 100%; height: 2px; background: var(--border); position: relative;
        }
        .route-bar::after {
            content: '✈'; position: absolute; right: -4px; top: -9px;
            font-size: 14px; color: var(--primary);
        }
        .route-stops { font-size: 11px; color: var(--success); }
        .route-stops.has-stops { color: var(--accent); }

        /* Price Bar */
        .price-bar {
            border-top: 1px solid var(--border);
            padding: 12px 16px;
            display: flex; justify-content: space-between; align-items: center;
            background: #fafbfc;
        }
        .price-source {
            font-size: 11px; color: var(--text-light);
            display: flex; align-items: center; gap: 4px;
        }
        .price-source i { font-size: 10px; color: var(--success); }
        .price-main { display: flex; align-items: center; gap: 12px; }
        .price-value {
            font-size: 20px; font-weight: 700; color: var(--accent);
        }
        .book-btn {
            padding: 6px 16px; background: var(--primary);
            color: white; border: none; border-radius: 6px;
            font-size: 13px; font-weight: 600; cursor: pointer;
            text-decoration: none; display: inline-block;
            transition: background 0.2s;
        }
        .book-btn:hover { background: var(--primary-dark); }

        /* Multi-platform expand */
        .platforms-expand {
            border-top: 1px solid var(--border); background: #f8f9fa;
            display: none;
        }
        .platforms-expand.active { display: block; }
        .platforms-toggle {
            width: 100%; padding: 8px 16px;
            background: none; border: none; cursor: pointer;
            font-size: 12px; color: var(--text-light);
            display: flex; align-items: center; justify-content: center; gap: 4px;
        }
        .platforms-toggle:hover { color: var(--primary); }
        .platform-links {
            padding: 8px 16px 12px;
            display: flex; flex-wrap: wrap; gap: 8px;
        }
        .platform-link {
            padding: 6px 12px; background: white;
            border: 1px solid var(--border); border-radius: 6px;
            font-size: 12px; color: var(--text);
            text-decoration: none; cursor: pointer;
            transition: all 0.2s;
        }
        .platform-link:hover { border-color: var(--primary); color: var(--primary); }
        .platform-link .price { font-weight: 700; color: var(--accent); }

        /* Loading */
        .loading { text-align: center; padding: 40px 16px; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading p { color: var(--text-light); font-size: 14px; }

        /* Empty / Error */
        .empty-state {
            text-align: center; padding: 48px 16px; color: var(--text-light);
        }
        .empty-state i { font-size: 48px; margin-bottom: 12px; color: var(--border); display: block; }
        .empty-state p { font-size: 14px; }

        /* Toast */
        .toast {
            position: fixed; bottom: 24px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #333; color: white;
            padding: 12px 24px; border-radius: 8px;
            font-size: 14px; z-index: 1000;
            transition: transform 0.3s;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        /* Data source */
        .data-source { max-width: 600px; margin: 0 auto 12px; padding: 0 16px; }
        .source-badge {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 11px; color: var(--text-light);
            background: white; padding: 4px 10px;
            border-radius: 20px; border: 1px solid var(--border);
        }
        .source-badge i { color: var(--success); font-size: 10px; }

        /* Sort bar */
        .sort-bar {
            max-width: 600px; margin: 0 auto 12px; padding: 0 16px;
            display: flex; gap: 8px;
        }
        .sort-btn {
            padding: 6px 12px; background: white;
            border: 1px solid var(--border); border-radius: 20px;
            font-size: 12px; color: var(--text-light); cursor: pointer;
            transition: all 0.2s;
        }
        .sort-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* Responsive */
        @media (max-width: 480px) {
            .header h1 { font-size: 20px; }
            .route-time { font-size: 18px; }
            .price-value { font-size: 17px; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1><i class="fas fa-plane"></i> 机票比价</h1>
    <p>实时票价查询 · 多平台跳转比价</p>
</div>

<div class="search-panel">
    <div class="search-card">
        <div class="swap-row">
            <div class="input-group">
                <label>出发地</label>
                <input type="text" id="fromInput" placeholder="城市或机场" autocomplete="off">
                <div class="suggestions" id="fromSuggestions"></div>
            </div>
            <button class="swap-btn" id="swapBtn" title="交换"><i class="fas fa-exchange-alt"></i></button>
            <div class="input-group">
                <label>目的地</label>
                <input type="text" id="toInput" placeholder="城市或机场" autocomplete="off">
                <div class="suggestions" id="toSuggestions"></div>
            </div>
        </div>
        <div class="date-row">
            <label style="display:block;font-size:12px;color:var(--text-light);margin-bottom:4px;font-weight:500;">出发日期</label>
            <input type="date" id="dateInput">
        </div>
        <button class="search-btn" id="searchBtn">
            <i class="fas fa-search"></i> 搜索航班
        </button>
    </div>
</div>

<div id="dataInfo" class="data-source" style="display:none;">
    <span class="source-badge">
        <i class="fas fa-circle"></i> 实时票价: Sky Scanner · 点击"去比价"跳转携程/去哪儿等平台
    </span>
</div>

<div class="results" id="results">
    <div class="empty-state">
        <i class="fas fa-plane-departure"></i>
        <p>输入出发地和目的地，搜索航班</p>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== CONFIG =====
const RAPID_KEY = '4f791cc878msh50050dba118db59p1e44e6jsn0af00e876510';
const API_HOST = 'sky-scrapper.p.rapidapi.com';
const API_BASE = `https://${API_HOST}/api/v1`;

const headers = {
    'X-RapidAPI-Key': RAPID_KEY,
    'X-RapidAPI-Host': API_HOST,
};

// ===== DOM =====
const fromInput = document.getElementById('fromInput');
const toInput = document.getElementById('toInput');
const dateInput = document.getElementById('dateInput');
const searchBtn = document.getElementById('searchBtn');
const swapBtn = document.getElementById('swapBtn');
const resultsDiv = document.getElementById('results');
const fromSuggestions = document.getElementById('fromSuggestions');
const toSuggestions = document.getElementById('toSuggestions');
const toast = document.getElementById('toast');
const dataInfo = document.getElementById('dataInfo');

// Default date: tomorrow
const tomorrow = new Date();
tomorrow.setDate(tomorrow.getDate() + 1);
dateInput.value = tomorrow.toISOString().split('T')[0];

// Store selected airport data
let fromAirport = null;
let toAirport = null;

// ===== AIRPORT SEARCH (debounced) =====
let searchTimer = null;
function debounceSearch(input, container, isFrom) {
    clearTimeout(searchTimer);
    const q = input.value.trim();
    if (q.length < 1) { container.classList.remove('active'); return; }
    searchTimer = setTimeout(async () => {
        try {
            const resp = await fetch(`${API_BASE}/flights/searchAirport?query=${encodeURIComponent(q)}&locale=zh-CN`, { headers });
            const data = await resp.json();
            if (!data.data || data.data.length === 0) {
                container.classList.remove('active');
                return;
            }
            container.innerHTML = data.data.map(item => {
                const p = item.presentation || {};
                const nav = item.navigation || {};
                const fp = nav.relevantFlightParams || {};
                const skyId = fp.skyId || '';
                const entityId = fp.entityId || '';
                const subtitle = p.subtitle || '';
                return `<div class="suggestion-item" data-sky="${skyId}" data-entity="${entityId}" data-name="${p.title || ''}" data-code="${skyId}">
                    <span class="code">${skyId}</span> ${p.suggestionTitle || p.title || ''}
                    <div class="city">${subtitle}</div>
                </div>`;
            }).join('');
            container.classList.add('active');

            container.querySelectorAll('.suggestion-item').forEach(item => {
                item.addEventListener('click', () => {
                    const airportData = {
                        skyId: item.dataset.sky,
                        entityId: item.dataset.entity,
                        name: item.dataset.name,
                    };
                    if (isFrom) {
                        fromInput.value = `${item.dataset.name} (${item.dataset.code})`;
                        fromAirport = airportData;
                        fromSuggestions.classList.remove('active');
                    } else {
                        toInput.value = `${item.dataset.name} (${item.dataset.code})`;
                        toAirport = airportData;
                        toSuggestions.classList.remove('active');
                    }
                });
            });
        } catch (e) {
            console.warn('Airport search error:', e);
        }
    }, 400);
}

fromInput.addEventListener('input', () => {
    fromAirport = null;
    debounceSearch(fromInput, fromSuggestions, true);
});
toInput.addEventListener('input', () => {
    toAirport = null;
    debounceSearch(toInput, toSuggestions, false);
});
fromInput.addEventListener('focus', () => {
    if (!fromAirport && fromInput.value.length > 0) debounceSearch(fromInput, fromSuggestions, true);
});
toInput.addEventListener('focus', () => {
    if (!toAirport && toInput.value.length > 0) debounceSearch(toInput, toSuggestions, false);
});
document.addEventListener('click', (e) => {
    if (!e.target.closest('.input-group')) {
        fromSuggestions.classList.remove('active');
        toSuggestions.classList.remove('active');
    }
});

// Swap
swapBtn.addEventListener('click', () => {
    const tmpVal = fromInput.value;
    fromInput.value = toInput.value;
    toInput.value = tmpVal;
    const tmpData = fromAirport;
    fromAirport = toAirport;
    toAirport = tmpData;
});

// ===== API: SEARCH FLIGHTS =====
async function searchFlights(from, to, date) {
    const url = `${API_BASE}/flights/searchFlights?originSkyId=${from.skyId}&destinationSkyId=${to.skyId}&originEntityId=${from.entityId}&destinationEntityId=${to.entityId}&date=${date}&adults=1&currency=CNY&market=zh-CN&countryCode=CN&sortBy=best&limit=20`;
    const resp = await fetch(url, { headers });
    const data = await resp.json();
    if (!data.status) throw new Error('API 返回异常');
    return data.data?.itineraries || [];
}

// ===== RENDER =====
function formatTime(isoStr) {
    if (!isoStr) return '--:--';
    const d = new Date(isoStr);
    return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
}

function formatDuration(min) {
    const h = Math.floor(min / 60);
    const m = min % 60;
    return h > 0 ? `${h}h ${m}m` : `${m}m`;
}

function renderFlights(itineraries) {
    if (!itineraries || itineraries.length === 0) {
        resultsDiv.innerHTML = `
            <div class="empty-state">
                <i class="fas fa-search"></i>
                <p>未找到航班，请尝试其他日期或航线</p>
            </div>`;
        return;
    }

    dataInfo.style.display = 'block';

    let html = `
        <div class="results-header">
            <h2>搜索结果</h2>
            <span class="results-count">${itineraries.length} 个航班</span>
        </div>`;

    itineraries.forEach((it, idx) => {
        const leg = it.legs?.[0];
        if (!leg) return;

        const carrier = leg.carriers?.marketing?.[0] || {};
        const airlineName = carrier.name || '未知航司';
        const airlineCode = carrier.alternateId || '??';
        const logoUrl = carrier.logoUrl || '';
        const flightNo = `${airlineCode}****`; // API doesn't always return flight number

        const depTime = formatTime(leg.departure);
        const arrTime = formatTime(leg.arrival);
        const originCode = leg.origin?.displayCode || leg.origin?.id || '';
        const destCode = leg.destination?.displayCode || leg.destination?.id || '';
        const originName = leg.origin?.name || '';
        const destName = leg.destination?.name || '';
        const duration = formatDuration(leg.durationInMinutes);
        const stops = leg.stopCount || 0;

        const price = it.price?.formatted || 'N/A';
        const priceRaw = it.price?.raw || 0;

        // Build booking links with flight params
        const depDate = leg.departure?.split('T')[0] || '';
        const bookingQuery = `from=${originCode}&to=${destCode}&date=${depDate}&airline=${airlineCode}`;

        html += `
        <div class="flight-card">
            <div class="flight-main">
                <div class="flight-airline">
                    <div class="airline-logo">
                        ${logoUrl ? `<img src="${logoUrl}" alt="${airlineCode}" onerror="this.parentElement.innerHTML='<span class=airline-logo-text>${airlineCode}</span>'">` : `<span class="airline-logo-text">${airlineCode}</span>`}
                    </div>
                    <div class="airline-info">
                        <div class="airline-name">${airlineName}</div>
                        <div class="flight-number">${airlineCode}</div>
                    </div>
                </div>
                <div class="flight-route">
                    <div class="route-point">
                        <div class="route-time">${depTime}</div>
                        <div class="route-code">${originCode}</div>
                        <div class="route-airport">${originName}</div>
                    </div>
                    <div class="route-line">
                        <div class="route-duration">${duration}</div>
                        <div class="route-bar"></div>
                        <div class="route-stops ${stops > 0 ? 'has-stops' : ''}">${stops === 0 ? '直飞' : stops + '次中转'}</div>
                    </div>
                    <div class="route-point">
                        <div class="route-time">${arrTime}</div>
                        <div class="route-code">${destCode}</div>
                        <div class="route-airport">${destName}</div>
                    </div>
                </div>
            </div>
            <div class="price-bar">
                <div class="price-source">
                    <i class="fas fa-circle"></i> Sky Scanner 实时价
                </div>
                <div class="price-main">
                    <span class="price-value">${price}</span>
                    <a class="book-btn" href="https://www.skyscanner.com.cn/transport/flights/${originCode}/${destCode}/${depDate.replace(/-/g,'').slice(2)}/?adultsv2=1&cabinclass=economy&ref=home" target="_blank" rel="noopener">去比价 →</a>
                </div>
            </div>
            <div class="platforms-expand" id="platforms-${idx}">
                <div class="platform-links">
                    <a class="platform-link" href="https://flights.ctrip.com/online/list/oneway-${originCode}-${destCode}?depdate=${depDate}&cabin=Y&adult=1&child=0&infant=0" target="_blank">
                        携程 <span class="price">${price}</span> 起
                    </a>
                    <a class="platform-link" href="https://www.qunar.com/search?searchType=oneWay&from=${originCode}&to=${destCode}&departDate=${depDate}" target="_blank">
                        去哪儿 <span class="price">${price}</span> 起
                    </a>
                    <a class="platform-link" href="https://www.fliggy.com/flight/domestic-search?tripType=1&departCity=${originCode}&arriveCity=${destCode}&departDate=${depDate}" target="_blank">
                        飞猪 <span class="price">${price}</span> 起
                    </a>
                    <a class="platform-link" href="https://www.tongcheng.com/flight/search?from=${originCode}&to=${destCode}&date=${depDate}" target="_blank">
                        同程 <span class="price">${price}</span> 起
                    </a>
                </div>
            </div>
            <button class="platforms-toggle" onclick="togglePlatforms(${idx})">
                <i class="fas fa-chevron-down"></i> 去各平台比价（携程/去哪儿/飞猪/同程）
            </button>
        </div>`;
    });

    resultsDiv.innerHTML = html;
}

function togglePlatforms(idx) {
    const el = document.getElementById(`platforms-${idx}`);
    el.classList.toggle('active');
    const btn = el.nextElementSibling;
    const icon = btn.querySelector('i');
    if (el.classList.contains('active')) {
        icon.classList.replace('fa-chevron-down', 'fa-chevron-up');
        btn.innerHTML = '<i class="fas fa-chevron-up"></i> 收起';
    } else {
        icon.classList.replace('fa-chevron-up', 'fa-chevron-down');
        btn.innerHTML = '<i class="fas fa-chevron-down"></i> 去各平台比价（携程/去哪儿/飞猪/同程）';
    }
}

// ===== TOAST =====
function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
}

// ===== SEARCH HANDLER =====
searchBtn.addEventListener('click', async () => {
    if (!fromAirport) {
        showToast('请先选择出发城市');
        return;
    }
    if (!toAirport) {
        showToast('请先选择到达城市');
        return;
    }
    const date = dateInput.value;
    if (!date) {
        showToast('请选择出发日期');
        return;
    }

    searchBtn.disabled = true;
    searchBtn.innerHTML = '<div class="spinner" style="width:20px;height:20px;border-width:2px;margin:0;"></div> 搜索中...';

    resultsDiv.innerHTML = `
        <div class="loading">
            <div class="spinner"></div>
            <p>正在搜索 ${fromAirport.name} → ${toAirport.name} 的实时票价...</p>
        </div>`;

    try {
        const itineraries = await searchFlights(fromAirport, toAirport, date);
        renderFlights(itineraries);
    } catch (e) {
        resultsDiv.innerHTML = `
            <div class="empty-state">
                <i class="fas fa-exclamation-circle"></i>
                <p>搜索出错: ${e.message}</p>
            </div>`;
    }

    searchBtn.disabled = false;
    searchBtn.innerHTML = '<i class="fas fa-search"></i> 搜索航班';
});
</script>
</body>
</html>
